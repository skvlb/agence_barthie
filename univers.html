<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Nos Univers – Conciergerie privée, traiteur haut de gamme, accueil premium et orchestration d'événements de luxe." />
  <title>Nos Univers – Agence Barthié</title>
  <link rel="icon" type="image/svg+xml" href="/logo-ab.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500;0,6..96,600;0,6..96,700;1,6..96,400;1,6..96,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    body { opacity: 0; visibility: hidden; }
    body.is-loaded { opacity: 1; visibility: visible; transition: opacity 0.8s ease-out; }
  </style>
</head>
<body>
  <div id="custom-cursor"></div>
  <div id="custom-cursor-follower"></div>

  <nav id="navbar"></nav>

  <!-- ========== HERO ========== -->
  <section id="hero" class="hero hero--univers">
    <div class="hero__image-wrapper">
      <img src="/Agence Barthié - Contenu /Privatisation de lieux/Péniche/IMG_7826.jpg" alt="Nos Univers" class="hero__image" />
      <div class="hero__overlay"></div>
    </div>
    <div class="hero__content-container container">
      <div class="hero__title-block">
        <h1 class="hero__title reveal">
          <span class="hero__title-part hero__title-part--normal" data-i18n="univers.hero_title_1">Nos</span><br/>
          <span class="hero__title-part hero__title-part--italic" data-i18n="univers.hero_title_2">Univers</span>
        </h1>
      </div>
    </div>
  </section>

  <!-- ========== GRILLE SERVICES ========== -->
  <section id="services" class="section section--services">
    <div class="container">
      <div id="services-grid" class="services-grid">
        <!-- Rempli dynamiquement par univers.js depuis src/data/services.js -->
      </div>
    </div>
  </section>

  <footer id="footer"></footer>
  <div id="scroll-progress"></div>

  <script type="module" src="/src/main.js"></script>
  <script type="module" src="/src/pages/univers/univers.js"></script>
</body>
</html>
